<h2>Session Log</h2>

<div class="toolbar">
  <mat-form-field appearance="outline">
    <mat-label>Project</mat-label>
    <input matInput [(ngModel)]="project" />
  </mat-form-field>
  <button mat-stroked-button (click)="load()">
    <mat-icon>refresh</mat-icon> Load
  </button>
</div>

@if (loading()) {
  <mat-spinner />
} @else {
  <p style="color:#666; font-size:0.9rem">{{ turns().length }} turns</p>
  <table mat-table [dataSource]="turns()" class="session-table">
    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef>Time</th>
      <td mat-cell *matCellDef="let t">{{ t.created_at | date:'short' }}</td>
    </ng-container>
    <ng-container matColumnDef="user_role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let t">{{ t.user_role }}</td>
    </ng-container>
    <ng-container matColumnDef="project_id">
      <th mat-header-cell *matHeaderCellDef>Project</th>
      <td mat-cell *matCellDef="let t">{{ t.project_id }}</td>
    </ng-container>
    <ng-container matColumnDef="query">
      <th mat-header-cell *matHeaderCellDef>Query</th>
      <td mat-cell *matCellDef="let t" class="truncate">{{ t.query }}</td>
    </ng-container>
    <ng-container matColumnDef="response">
      <th mat-header-cell *matHeaderCellDef>Response (truncated)</th>
      <td mat-cell *matCellDef="let t" class="truncate">{{ t.response }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}

<style>
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .session-table { width: 100%; background: #fff; }
  .truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.82rem; }
</style>
